name: ci

on:
  push:
    branches: [main]
  pull_request:

# PR-10 split CI into two parallel jobs: `test` runs the pytest suite,
# `smoke` runs `make smoke` (scripts/smoke.py — hunt → tailor → submit
# import + data flow). Running them in parallel keeps total CI time at
# the slower of the two rather than the sum, and makes a smoke regression
# distinguishable at a glance from a unit-test regression.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Collect tests
        run: pytest --collect-only
      - name: Run tests
        run: pytest -v

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run smoke target
        run: make smoke
