name: ci

on:
  push:
    branches: [main]
  pull_request:

# Local-Playwright consolidation: the legacy ``smoke`` job invoked
# ``make smoke`` → ``scripts/smoke.py`` to validate the Browserbase +
# Stagehand import wiring. With Path B retired, the smoke harness is
# parked at ``scripts/smoke_legacy.py`` and is no longer a CI target —
# pytest's default suite (which excludes the ``legacy`` marker) provides
# the equivalent live-tree import-wiring coverage.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Collect tests
        run: pytest --collect-only
      - name: Run tests
        run: pytest -v
