name: tailor

# Dashboard "Run tailor" button. Manual-only — no cron because PR-13's
# split made jobpipe-tailor tailor-only (it processes status='approved'
# rows), and there's no value in firing it on a clock without fresh
# human approvals to pick up.
#
# Wiring matches hunt.yml: portfolio's RunsPanel inserts a public.runs
# row at click time, dispatches this workflow with the row id as the
# `run_id` input, and scripts/mark_run.py transitions the row through
# running → completed/failed.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "public.runs.id to update (omit for manual smoke runs)"
        required: false
      job_id:
        description: "Single jobs.id to tailor (PR-14). Omit to tailor every approved row."
        required: false

jobs:
  tailor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install LaTeX (for resume PDF compile)
        # ubuntu-latest doesn't ship pdflatex; the tailor pipeline calls
        # it via jobpipe.tailor.tailor.latex_resume to render the
        # resume to PDF. --no-install-recommends keeps install at
        # ~400-600 MB instead of 4+ GB. Verified \usepackage list
        # against the inline LATEX_TEMPLATE in latex_resume.py — these
        # four packages cover article + fontenc + geometry + enumitem
        # + titlesec + hyperref + xcolor + textcomp + Computer Modern.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended
      - name: Install package
        run: pip install -e .
      - name: Mark run as running
        if: inputs.run_id != ''
        run: python scripts/mark_run.py ${{ inputs.run_id }} running
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Tailor
        id: tailor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Leftover coupling from pre-PR-11: tailor.url_resolver imports
          # from jobpipe.submit.config which require_env's the Browserbase
          # keys at import time. PR-15 will remove the coupling itself;
          # in the meantime the workflow needs them present so the import
          # succeeds.
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        run: |
          if [ -n "${{ inputs.job_id }}" ]; then
            jobpipe-tailor --once --job-id "${{ inputs.job_id }}" 2>&1 | tee tailor.log
          else
            jobpipe-tailor --once 2>&1 | tee tailor.log
          fi
          echo "EXITCODE=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Mark run completed
        if: always() && inputs.run_id != ''
        run: |
          python scripts/mark_run.py ${{ inputs.run_id }} \
            ${{ steps.tailor.outputs.EXITCODE == '0' && 'completed' || 'failed' }} \
            --log "$(tail -50 tailor.log)" \
            --gha-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
