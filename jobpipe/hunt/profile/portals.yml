# ──────────────────────────────────────────────────────────────────────────
# Workday — <tenant>.wd<N>.myworkdayjobs.com/<site>
#
# Workday tenants vary by data-center number (wd1/wd3/wd5/wd103). Each
# tenant exposes a public job-search endpoint at:
#   https://<tenant>.wd<N>.myworkdayjobs.com/wday/cxs/<tenant>/<site>/jobs
# The hunter POSTs an empty filter to that URL and walks pages.
#
# For a new company:
#   - Visit their careers page; the URL exposes tenant + site + dc.
#   - Drop the row below; use a small page cap (default 50) until you
#     trust the slug isn't going to flood your scorer.
# ──────────────────────────────────────────────────────────────────────────
workday:
  companies:
    # Examples — verify the dc number against the live careers URL before
    # adding more. Empty list is safe (Workday source returns nothing).

# ──────────────────────────────────────────────────────────────────────────
# Title pre-filter — applied BEFORE LLM scoring (J-1).
# Pure substring match (case-insensitive). Cheap, conservative.
# ──────────────────────────────────────────────────────────────────────────
title_filter:
  # Auto-skip titles containing any of these terms. Real disqualifiers
  # only — we'd rather over-LLM-score than miss a Tier 1 role because of
  # a noisy keyword. Be selective.
  reject_substrings:
    - "internship"
    - "intern,"
    - "intern - "
    - "vp of"
    - "vice president"
    - "chief executive"
    - "ceo"
    - "cfo"
    - "coo"
    - "cmo"
    - "hr business partner"
    - "recruiter"
    - "talent acquisition"
    - "executive assistant"
    - "office manager"
    - "office coordinator"
    - "social media manager"

  # Always score titles containing any of these — strong positive signal.
  # Used to log a hint in agent.log; doesn't gate filtering.
  prefer_substrings:
    - "neuromorphic"
    - "spiking"
    - "connectom"
    - "neural"
    - "neuroscience"
    - "bci"
    - "brain-computer"
    - "neurotech"
    - "neuroprosth"
    - "applied scientist"
    - "research engineer"
    - "research scientist"
    - "ml engineer"
    - "machine learning engineer"
    - "computer vision"
    - "sales engineer"
    - "solutions engineer"
    - "developer relations"
    - "developer advocate"
    - "ai engineer"

  # Soft seniority hint — boosts logging only. Both individual contributors
  # and senior IC titles are welcome; what we filter against is leadership
  # (already handled in reject_substrings).
  seniority_substrings:
    - "senior"
    - "staff"
    - "principal"
    - "lead"
    - "sr."
    - "sr "
